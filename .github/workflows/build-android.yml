# =============================================================================
#  build-android.yml - PentagonMan (Edición Lanzamiento Oficial)
#  Compila el código fuente nativo de LÖVE inyectando recursos y juego.
# =============================================================================

name: Build Android APK (Release)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Descargar el Repositorio ──────────────────────────────────────────
      - name: Checkout del proyecto
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Asegura traer dependencias nativas de LÖVE si existen

      # ── 2. Configurar Java (Requerido por el compilador de Android) ──────────
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Configurar Android SDK ────────────────────────────────────────────
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Inyectar tu juego (game.love) en el código nativo ─────────────────
      - name: Preparar assets del juego
        run: |
          echo "Inyectando game.love en los assets del proyecto..."
          mkdir -p app/src/main/assets
          cp game.love app/src/main/assets/game.love

      # ── 5. Reemplazar Íconos e ID del Juego Automáticamente ──────────────────
      - name: Personalizar Identidad de PentagonMan
        run: |
          echo "Configurando nombre e íconos oficiales..."
          
          # Reemplazar el nombre de la app de "LÖVE" a "PentagonMan"
          # Modifica el archivo de textos de Android
          SED_TARGET="app/src/main/res/values/strings.xml"
          if [ -f "$SED_TARGET" ]; then
            sed -i 's/name="app_name">LÖVE/name="app_name">PentagonMan/g' "$SED_TARGET"
          fi

          # Copiar tu icon.png a las carpetas del compilador si existe
          if [ -f "icon.png" ]; then
            # El código de LÖVE maneja el ícono principal como ic_launcher.png
            # Lo copiamos a la carpeta base de recursos de la app
            mkdir -p app/src/main/res/drawable
            cp icon.png app/src/main/res/drawable/ic_launcher.png
            
            # Forzar el reemplazo en los directorios mipmap redundantes
            for dir in app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp icon.png "$dir/ic_launcher.png"
                cp icon.png "$dir/ic_launcher_round.png" 2>/dev/null || true
              fi
            done
          fi

      # ── 6. Dar permisos de ejecución al compilador Gradle ────────────────────
      - name: Permisos para Gradle
        run: chmod +x gradlew

      # ── 7. Compilar el APK con Gradle (Modo Ensamblado) ──────────────────────
      - name: Compilar APK con Gradle
        run: ./gradlew assembleEmbedNoRecordRelease

      # ── 8. Alinear y Firmar el APK Resultante ────────────────────────────────
      - name: Firmar APK para pruebas masivas
        run: |
          # Encontrar el APK generado por Gradle
          RAW_APK=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
          
          echo "Alineando el APK generado en: $RAW_APK"
          zipalign -f -p -v 4 "$RAW_APK" love-aligned.apk > /dev/null

          echo "Generando clave de firmado temporal..."
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US" > /dev/null

          echo "Firmando APK final..."
          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out PentagonMan-Lanzamiento.apk \
            love-aligned.apk

          echo "¡Proceso terminado con éxito!"

      # ── 9. Guardar y Exportar el APK final de PentagonMan ───────────────────
      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: PentagonMan-Lanzamiento-APK
          path: PentagonMan-Lanzamiento.apk
          retention-days: 7