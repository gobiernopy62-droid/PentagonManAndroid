# =============================================================================
#  build-android.yml  PentagonMan
#  Genera un APK de prueba con firma debug y un log de consola.
#
#  Requisitos en la raíz del repo:
#    - game.love
#    - icon.png  (cualquier tamaño; se redimensiona automáticamente)
#
#  Triggers:
#    - Push a main
#    - Ejecución manual (workflow_dispatch)
#
#  Artifacts generados:
#    - PentagonMan-beta.apk   → instalar en Android con fuentes desconocidas
#    - build-log.txt          → log completo de todos los pasos del build
# =============================================================================

name: Build Android APK (Beta)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ── 2. Instalar dependencias ─────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick zipalign apksigner 2>&1

      # ── 3. Inicializar log ───────────────────────────────────────────────────
      - name: Inicializar log de build
        run: |
          echo "=============================================" >> build-log.txt
          echo "  PentagonMan - Build Log (Beta APK)"         >> build-log.txt
          echo "  Fecha: $(date '+%Y-%m-%d %H:%M:%S UTC')"   >> build-log.txt
          echo "  Commit: ${{ github.sha }}"                  >> build-log.txt
          echo "  Branch: ${{ github.ref_name }}"             >> build-log.txt
          echo "  Runner: ${{ runner.os }}"                   >> build-log.txt
          echo "=============================================" >> build-log.txt
          echo ""                                             >> build-log.txt

      # ── 4. Verificar archivos requeridos ─────────────────────────────────────
      - name: Verificar game.love e icon.png
        run: |
          echo "[ PASO 1 ] Verificando archivos requeridos..." | tee -a build-log.txt
          echo "-------------------------------------------"   >> build-log.txt

          ERROR=0

          if [ -f "game.love" ] && [ -s "game.love" ]; then
            echo "  -> game.love encontrado. OK ($(du -sh game.love | cut -f1))" >> build-log.txt
          else
            echo "  -> ERROR: game.love no existe o está vacío." >> build-log.txt
            ERROR=1
          fi

          if [ -f "icon.png" ] && [ -s "icon.png" ]; then
            echo "  -> icon.png encontrado. OK ($(du -sh icon.png | cut -f1))" >> build-log.txt
          else
            echo "  -> ADVERTENCIA: icon.png no encontrado. Se usará el ícono por defecto de LÖVE." >> build-log.txt
          fi

          echo "" >> build-log.txt
          [ $ERROR -eq 1 ] && exit 1 || true

      # ── 5. Descargar APK base de LÖVE 11.4 ──────────────────────────────────
      - name: Descargar APK base de LÖVE 11.4
        run: |
          echo "[ PASO 2 ] Descargando APK base de LÖVE 11.4..." | tee -a build-log.txt
          echo "-------------------------------------------"      >> build-log.txt

          wget -v \
            https://github.com/love2d/love/releases/download/11.4/love-11.4-android.apk \
            -O love-base.apk \
            2>&1 | tee -a build-log.txt

          echo ""                                                                     >> build-log.txt
          echo "  -> love-base.apk descargado. ($(du -sh love-base.apk | cut -f1))" >> build-log.txt
          echo ""                                                                     >> build-log.txt

      # ── 6. Reemplazar ícono directamente en el ZIP ───────────────────────────
      - name: Reemplazar ícono en el APK
        run: |
          echo "[ PASO 3 ] Reemplazando ícono..." | tee -a build-log.txt
          echo "-------------------------------------------"    >> build-log.txt

          if [ ! -f "icon.png" ]; then
            echo "  -> Sin icon.png, se omite este paso."       >> build-log.txt
            cp love-base.apk love-iconic.apk
          else
            cp love-base.apk love-iconic.apk

            declare -A SIZES=(
              ["res/drawable-mdpi/love.png"]=48
              ["res/drawable-hdpi/love.png"]=72
              ["res/drawable-xhdpi/love.png"]=96
              ["res/drawable-xxhdpi/love.png"]=144
              ["res/drawable-xxxhdpi/love.png"]=192
            )

            mkdir -p icon_tmp

            for PATH_IN_APK in "${!SIZES[@]}"; do
              SIZE=${SIZES[$PATH_IN_APK]}
              if unzip -l love-iconic.apk | grep -q "$PATH_IN_APK"; then
                mkdir -p "icon_tmp/$(dirname $PATH_IN_APK)"
                convert icon.png -resize ${SIZE}x${SIZE} "icon_tmp/$PATH_IN_APK" 2>&1 | tee -a build-log.txt
                cd icon_tmp
                zip -f ../love-iconic.apk "$PATH_IN_APK" 2>&1 | tee -a ../build-log.txt
                cd ..
                echo "  -> $PATH_IN_APK → ${SIZE}x${SIZE}px OK" >> build-log.txt
              else
                echo "  -> $PATH_IN_APK no existe en el APK, omitiendo." >> build-log.txt
              fi
            done

            rm -rf icon_tmp
            echo "  -> Ícono procesado." >> build-log.txt
          fi

          echo "" >> build-log.txt

      # ── 7. Insertar game.love dentro del APK con Python ──────────────────────
      # Se usa Python en lugar de "cat" para preservar la estructura del ZIP
      # y que apksigner pueda firmar el APK sin errores de formato.
      - name: Insertar game.love en el APK
        run: |
          echo "[ PASO 4 ] Insertando game.love en el APK con Python..." | tee -a build-log.txt
          echo "-------------------------------------------"              >> build-log.txt

          python3 << 'PYEOF'
          import zipfile
          import shutil
          import os

          src = "love-iconic.apk"
          dst = "love-with-game.apk"
          game = "game.love"

          shutil.copy(src, dst)

          with zipfile.ZipFile(dst, "a", compression=zipfile.ZIP_STORED) as zf:
              zf.write(game, game)

          print(f"  -> game.love insertado correctamente en el APK.")
          print(f"  -> Tamaño resultante: {os.path.getsize(dst) / 1024 / 1024:.1f} MB")
          PYEOF

          echo "" >> build-log.txt
          python3 -c "
          import zipfile, shutil, os
          shutil.copy('love-iconic.apk', 'love-with-game.apk')
          with zipfile.ZipFile('love-with-game.apk', 'a', compression=zipfile.ZIP_STORED) as zf:
              zf.write('game.love', 'game.love')
          size = os.path.getsize('love-with-game.apk') / 1024 / 1024
          print(f'  -> game.love insertado correctamente. ({size:.1f} MB)')
          " 2>&1 | tee -a build-log.txt

          echo "" >> build-log.txt

      # ── 8. Zipalign ──────────────────────────────────────────────────────────
      - name: Zipalign
        run: |
          echo "[ PASO 5 ] Zipalign..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          zipalign -v 4 love-with-game.apk love-aligned.apk \
            2>&1 | tee -a build-log.txt

          echo "  -> Zipalign completado. ($(du -sh love-aligned.apk | cut -f1))" >> build-log.txt
          echo "" >> build-log.txt

      # ── 9. Firmar el APK con firma debug ─────────────────────────────────────
      - name: Firmar APK con firma debug
        run: |
          echo "[ PASO 6 ] Firmando APK..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US" \
            2>&1 | tee -a build-log.txt

          echo "  -> Keystore debug generado." >> build-log.txt

          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out PentagonMan-beta.apk \
            love-aligned.apk \
            2>&1 | tee -a build-log.txt

          echo "" >> build-log.txt
          echo "  -> APK firmado. ($(du -sh PentagonMan-beta.apk | cut -f1))" >> build-log.txt
          echo "" >> build-log.txt

      # ── 10. Verificar firma ──────────────────────────────────────────────────
      - name: Verificar firma del APK
        run: |
          echo "[ PASO 7 ] Verificando firma..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          if [ -f "PentagonMan-beta.apk" ] && [ -s "PentagonMan-beta.apk" ]; then
            echo "  -> APK encontrado y no vacío. OK" >> build-log.txt
          else
            echo "  -> ERROR: El APK no existe o está vacío." >> build-log.txt
            exit 1
          fi

          apksigner verify --verbose PentagonMan-beta.apk 2>&1 | tee -a build-log.txt
          echo "" >> build-log.txt

      # ── 11. Resumen final ────────────────────────────────────────────────────
      - name: Resumen final
        run: |
          echo "=============================================" >> build-log.txt
          echo "  BUILD COMPLETADO EXITOSAMENTE"              >> build-log.txt
          echo "  Fin: $(date '+%Y-%m-%d %H:%M:%S UTC')"     >> build-log.txt
          echo "=============================================" >> build-log.txt

      # ── 12. Subir APK como artifact ──────────────────────────────────────────
      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: PentagonMan-beta
          path: PentagonMan-beta.apk
          retention-days: 7

      # ── 13. Subir log como artifact ──────────────────────────────────────────
      - name: Subir log como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7