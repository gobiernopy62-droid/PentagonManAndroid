# =============================================================================
#  build-android.yml  PentagonMan
#  Genera un APK de prueba con firma debug y un log de consola.
# =============================================================================

name: Build Android APK (Beta)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ── 2. Instalar dependencias ─────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick zipalign apksigner zip unzip 2>&1

      # ── 3. Inicializar log ───────────────────────────────────────────────────
      - name: Inicializar log de build
        run: |
          echo "=============================================" >> build-log.txt
          echo "  PentagonMan - Build Log (Beta APK)"         >> build-log.txt
          echo "  Fecha: $(date '+%Y-%m-%d %H:%M:%S UTC')"   >> build-log.txt
          echo "  Commit: ${{ github.sha }}"                  >> build-log.txt
          echo "  Branch: ${{ github.ref_name }}"             >> build-log.txt
          echo "  Runner: ${{ runner.os }}"                   >> build-log.txt
          echo "=============================================" >> build-log.txt
          echo ""                                             >> build-log.txt

      # ── 4. Verificar archivos requeridos ─────────────────────────────────────
      - name: Verificar game.love e icon.png
        run: |
          echo "[ PASO 1 ] Verificando archivos requeridos..." | tee -a build-log.txt
          echo "-------------------------------------------"   >> build-log.txt

          ERROR=0

          if [ -f "game.love" ] && [ -s "game.love" ]; then
            echo "  -> game.love encontrado. OK ($(du -sh game.love | cut -f1))" >> build-log.txt
          else
            echo "  -> ERROR: game.love no existe o está vacío." >> build-log.txt
            ERROR=1
          fi

          if [ -f "icon.png" ] && [ -s "icon.png" ]; then
            echo "  -> icon.png encontrado. OK ($(du -sh icon.png | cut -f1))" >> build-log.txt
          else
            echo "  -> ADVERTENCIA: icon.png no encontrado. Se usará el ícono por defecto." >> build-log.txt
          fi

          echo "" >> build-log.txt
          [ $ERROR -eq 1 ] && exit 1 || true

      # ── 5. Descargar APK base de LÖVE 11.4 ──────────────────────────────────
      - name: Descargar APK base de LÖVE 11.4
        run: |
          echo "[ PASO 2 ] Descargando APK base..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          wget -q -O love-base.apk https://github.com/love2d/love/releases/download/11.4/love-11.4-android.apk
          
          echo "  -> love-base.apk descargado. ($(du -sh love-base.apk | cut -f1))" >> build-log.txt
          echo "" >> build-log.txt

      # ── 6. Reemplazar ícono Dinámicamente ────────────────────────────────────
      - name: Reemplazar ícono en el APK
        run: |
          echo "[ PASO 3 ] Reemplazando ícono..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          cp love-base.apk love-iconic.apk

          if [ -f "icon.png" ]; then
            mkdir -p icon_tmp
            
            # Buscar todos los íconos de LÖVE dentro del APK
            ICON_PATHS=$(unzip -l love-iconic.apk | awk '{print $4}' | grep '^res/.*\.png$' | grep -iE 'love\.png|ic_launcher\.png')
            
            for path in $ICON_PATHS; do
              # Extraer ícono original para saber su tamaño
              unzip -p love-iconic.apk "$path" > temp_icon.png
              DIMENSIONS=$(identify -format "%wx%h" temp_icon.png)
              
              # Crear estructura de carpetas y redimensionar nuestro ícono
              mkdir -p "icon_tmp/$(dirname "$path")"
              convert icon.png -resize $DIMENSIONS "icon_tmp/$path"
              
              # Meter el ícono redimensionado de vuelta al APK
              cd icon_tmp
              zip -u ../love-iconic.apk "$path" > /dev/null
              cd ..
              
              echo "  -> Reemplazado: $path ($DIMENSIONS)" >> build-log.txt
            done
            
            rm -rf icon_tmp temp_icon.png
            echo "  -> Íconos actualizados exitosamente." >> build-log.txt
          else
            echo "  -> Sin icon.png, se omite este paso." >> build-log.txt
          fi
          echo "" >> build-log.txt

      # ── 7. Insertar game.love (Formato Nivel Cero) ───────────────────────────
      - name: Insertar game.love en el APK
        run: |
          echo "[ PASO 4 ] Insertando game.love..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          cp love-iconic.apk love-with-game.apk
          
          # Android y LÖVE requieren que el juego esté en la carpeta "assets"
          mkdir -p assets
          cp game.love assets/game.love
          
          # Se inserta sin comprimir (-0) para no romper Zipalign
          zip -0 -u love-with-game.apk assets/game.love > /dev/null

          echo "  -> game.love insertado en assets/game.love." >> build-log.txt
          echo "  -> Tamaño resultante: $(du -sh love-with-game.apk | cut -f1)" >> build-log.txt
          echo "" >> build-log.txt

      # ── 8. Zipalign (Alineación a 4-bytes) ───────────────────────────────────
      - name: Zipalign
        run: |
          echo "[ PASO 5 ] Zipalign..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          # -p asegura la alineación de página (crítico para .so) y -f fuerza la reescritura
          zipalign -f -p -v 4 love-with-game.apk love-aligned.apk > zipalign_output.txt 2>&1
          
          if grep -q "Verification FAILED" zipalign_output.txt; then
            echo "  -> ERROR: Falló la verificación de Zipalign." >> build-log.txt
            cat zipalign_output.txt >> build-log.txt
            exit 1
          else
            echo "  -> Zipalign completado y verificado. OK" >> build-log.txt
          fi
          echo "" >> build-log.txt

      # ── 9. Firmar el APK con firma debug ─────────────────────────────────────
      - name: Firmar APK con firma debug
        run: |
          echo "[ PASO 6 ] Firmando APK..." | tee -a build-log.txt
          echo "-------------------------------------------" >> build-log.txt

          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US" > /dev/null 2>&1

          echo "  -> Keystore debug generado." >> build-log.txt

          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out PentagonMan-beta.apk \
            love-aligned.apk > /dev/null 2>&1

          echo "  -> APK firmado exitosamente. ($(du -sh PentagonMan-beta.apk | cut -f1))" >> build-log.txt
          echo "" >> build-log.txt

      # ── 10. Resumen final ────────────────────────────────────────────────────
      - name: Resumen final
        run: |
          echo "=============================================" >> build-log.txt
          echo "  BUILD COMPLETADO EXITOSAMENTE"              >> build-log.txt
          echo "  Fin: $(date '+%Y-%m-%d %H:%M:%S UTC')"     >> build-log.txt
          echo "=============================================" >> build-log.txt

      # ── 11. Subir APK como artifact ──────────────────────────────────────────
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: PentagonMan-beta
          path: PentagonMan-beta.apk
          retention-days: 7

      # ── 12. Subir log como artifact ──────────────────────────────────────────
      - name: Subir Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7