# =============================================================================
#  build-android.yml - PentagonMan (Edición Lanzamiento Oficial Corregida)
#  Compila el código fuente nativo de LÖVE inyectando recursos y juego.
# =============================================================================

name: Build Android APK (Release)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Descargar el Repositorio ──────────────────────────────────────────
      - name: Checkout del proyecto
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Trae submódulos nativos si existen

      # ── 2. Configurar Java (Clave para Gradle moderno) ───────────────────────
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # Optimiza y acelera las descargas de Gradle

      # ── 3. Configurar Android SDK ────────────────────────────────────────────
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Inyectar tu juego (game.love) en el código nativo ─────────────────
      - name: Preparar assets del juego
        run: |
          echo "Inyectando game.love en los assets del proyecto..."
          mkdir -p app/src/main/assets
          if [ -f "game.love" ]; then
            cp game.love app/src/main/assets/game.love
          else
            echo "ERROR: No se encontró game.love en la raíz" && exit 1
          fi

      # ── 5. Reemplazar Íconos e ID del Juego Automáticamente ──────────────────
      - name: Personalizar Identidad de PentagonMan
        run: |
          echo "Configurando nombre e íconos oficiales..."
          
          # Cambiar el nombre de la app en los recursos de Android
          SED_TARGET="app/src/main/res/values/strings.xml"
          if [ -f "$SED_TARGET" ]; then
            sed -i 's/name="app_name">LÖVE/name="app_name">PentagonMan/g' "$SED_TARGET"
          else
            echo "Advertencia: strings.xml no encontrado en la ruta esperada."
          fi

          # Copiar tu icon.png a las carpetas del compilador
          if [ -f "icon.png" ]; then
            mkdir -p app/src/main/res/drawable
            cp icon.png app/src/main/res/drawable/ic_launcher.png
            
            for dir in app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp icon.png "$dir/ic_launcher.png"
                cp icon.png "$dir/ic_launcher_round.png" 2>/dev/null || true
              fi
            done
          fi

      # ── 6. Dar permisos y Limpiar Proyecto ───────────────────────────────────
      - name: Permisos y Limpieza de Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean

      # ── 7. Compilar el APK con Gradle (Con bypass de advertencias) ───────────
      - name: Compilar APK con Gradle
        run: |
          # -x lint evita que el compilador se detenga por alertas de diseño o traducción
          ./gradlew assembleEmbedNoRecordRelease -x lint > gradle_build_output.txt 2>&1

      # ── 8. Alinear y Firmar el APK Resultante ────────────────────────────────
      - name: Firmar APK para pruebas masivas
        if: success()
        run: |
          RAW_APK=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERROR: Gradle terminó pero no se generó ningún APK." && exit 1
          fi
          
          zipalign -f -p -v 4 "$RAW_APK" love-aligned.apk > /dev/null

          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US" > /dev/null

          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out PentagonMan-Lanzamiento.apk \
            love-aligned.apk

      # ── 9. Subir Reporte de Consola (SIEMPRE se ejecutará si hay error) ──────
      - name: Guardar Reporte de Errores de Gradle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Compilacion-Gradle
          path: gradle_build_output.txt
          retention-days: 3

      # ── 10. Guardar y Exportar el APK final ──────────────────────────────────
      - name: Subir APK Final
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PentagonMan-Lanzamiento-APK
          path: PentagonMan-Lanzamiento.apk
          retention-days: 7