# =============================================================================
#  build-android.yml - PentagonMan (Edición Compilación Aislada Profesional)
# =============================================================================

name: Build Android APK (Release)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Descargar TU repositorio (Para obtener tu game.love e icon.png) ───
      - name: Checkout de tu juego
        uses: actions/checkout@v4
        with:
          path: juego-repo

      # ── 2. Descargar el LÖVE Android Oficial DIRECTO de la fuente original ──
      - name: Checkout de LÖVE Android Oficial (Con todos sus submódulos)
        uses: actions/checkout@v4
        with:
          repository: love2d/love-android
          submodules: recursive  # Esto descarga megasource de forma nativa y perfecta
          path: love-android-src

      # ── 3. Configurar Java ───────────────────────────────────────────────────
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: love-android-src/build.gradle

      # ── 4. Configurar Android SDK ────────────────────────────────────────────
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Inyectar tu juego (game.love) en el motor oficial ─────────────────
      - name: Preparar assets del juego
        run: |
          echo "Inyectando game.love en los assets del proyecto oficial..."
          mkdir -p love-android-src/app/src/main/assets
          if [ -f "juego-repo/game.love" ]; then
            cp juego-repo/game.love love-android-src/app/src/main/assets/game.love
          else
            echo "ERROR: No se encontró game.love en la raíz de tu repositorio." && exit 1
          fi

      # ── 6. Personalizar Identidad de PentagonMan ──────────────────────────────
      - name: Personalizar Identidad de PentagonMan
        run: |
          echo "Configurando nombre e íconos oficiales..."
          
          # Cambiar el nombre de la app de LÖVE a PentagonMan
          SED_TARGET="love-android-src/app/src/main/res/values/strings.xml"
          if [ -f "$SED_TARGET" ]; then
            sed -i 's/name="app_name">LÖVE/name="app_name">PentagonMan/g' "$SED_TARGET"
          fi

          # Inyectar tu icon.png personalizado en las rutas nativas
          if [ -f "juego-repo/icon.png" ]; then
            mkdir -p love-android-src/app/src/main/res/drawable
            cp juego-repo/icon.png love-android-src/app/src/main/res/drawable/ic_launcher.png
            
            for dir in love-android-src/app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp juego-repo/icon.png "$dir/ic_launcher.png"
                cp juego-repo/icon.png "$dir/ic_launcher_round.png" 2>/dev/null || true
              fi
            done
          fi

      # ── 7. Permisos y Limpieza de Gradle ─────────────────────────────────────
      - name: Permisos y Limpieza de Gradle
        run: |
          cd love-android-src
          chmod +x gradlew
          ./gradlew clean

      # ── 8. Compilar el APK con Gradle ────────────────────────────────────────
      - name: Compilar APK con Gradle
        run: |
          cd love-android-src
          ./gradlew assembleEmbedNoRecordRelease -x lint > ../gradle_build_output.txt 2>&1

      # ── 9. Alinear y Firmar el APK Resultante ────────────────────────────────
      - name: Firmar APK para pruebas masivas
        if: success()
        run: |
          RAW_APK=$(find love-android-src/app/build/outputs/apk/ -name "*.apk" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERROR: Gradle terminó pero no se generó ningún APK." && exit 1
          fi
          
          zipalign -f -p -v 4 "$RAW_APK" love-aligned.apk > /dev/null

          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US" > /dev/null

          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out PentagonMan-Lanzamiento.apk \
            love-aligned.apk

      # ── 10. Guardar Reporte de Errores de Gradle (Solo si falla) ─────────────
      - name: Guardar Reporte de Errores de Gradle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Compilacion-Gradle
          path: gradle_build_output.txt
          retention-days: 3

      # ── 11. Guardar y Exportar el APK final ──────────────────────────────────
      - name: Subir APK Final
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PentagonMan-Lanzamiento-APK
          path: PentagonMan-Lanzamiento.apk
          retention-days: 7